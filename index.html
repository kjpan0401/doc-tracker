<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件進版管理系統</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --danger: #dc2626;
    --danger-hover: #b91c1c;
    --success: #16a34a;
    --warning: #f59e0b;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, var(--primary), #7c3aed);
    color: white; padding: 20px 24px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  header h1 { font-size: 1.4rem; }
  header p { font-size: .85rem; opacity: .85; margin-top: 4px; }

  .container { max-width: 1000px; margin: 0 auto; padding: 20px 16px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn {
    padding: 10px 20px; border: none; border-radius: var(--radius);
    background: var(--card); color: var(--text); cursor: pointer;
    font-size: .95rem; font-weight: 500; box-shadow: 0 1px 3px rgba(0,0,0,.08);
    transition: all .2s;
  }
  .tab-btn:hover { background: var(--primary); color: white; }
  .tab-btn.active { background: var(--primary); color: white; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .card {
    background: var(--card); border-radius: var(--radius); padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px;
  }
  .card h3 { font-size: 1.1rem; margin-bottom: 12px; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-weight: 500; margin-bottom: 4px; font-size: .9rem; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 16px; font-family: inherit; -webkit-appearance: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.15);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) {
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    .modal-overlay { padding: 0; align-items: stretch; }
    .modal { border-radius: 0; min-height: 100vh; padding: 16px; padding-top: 50px; }
    .tabs { gap: 4px; }
    .tab-btn { padding: 8px 12px; font-size: .85rem; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    header h1 { font-size: 1.1rem; }
    .section-header { font-size: .95rem; padding: 10px 12px; }
  }

  .btn {
    padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
    font-size: .9rem; font-weight: 500; font-family: inherit; transition: all .2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: var(--danger-hover); }
  .btn-success { background: var(--success); color: white; }
  .btn-sm { padding: 6px 12px; font-size: .8rem; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--bg); }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: .75rem; font-weight: 500;
  }
  .badge-danger { background: #fee2e2; color: var(--danger); }
  .badge-warning { background: #fef3c7; color: #b45309; }
  .badge-success { background: #dcfce7; color: var(--success); }
  .badge-info { background: #dbeafe; color: var(--primary); }
  .badge-purple { background: #f3e8ff; color: #7c3aed; }

  .checklist-add { display: flex; gap: 8px; margin-bottom: 12px; }
  .checklist-add input { flex: 1; }
  .checklist-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .checklist-item:last-child { border-bottom: none; }
  .checklist-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
  .checklist-item .item-text { flex: 1; font-size: .9rem; }
  .checklist-item .item-text.done { text-decoration: line-through; color: var(--text-light); }
  .checklist-item .remove-item { color: var(--danger); cursor: pointer; background: none; border: none; font-size: 1.1rem; }

  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .progress-bar .fill { height: 100%; border-radius: 3px; background: var(--primary); transition: width .3s; }
  .progress-bar .fill.complete { background: var(--success); }

  .date-result {
    margin-top: 6px; padding: 8px 12px; border-radius: 8px; font-size: .85rem; font-weight: 500;
    display: none;
  }
  .date-result.show { display: block; }
  .date-result.ok { background: #dbeafe; color: var(--primary); }
  .date-result.warn { background: #fef3c7; color: #b45309; }
  .date-result.danger { background: #fee2e2; color: var(--danger); }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 200; justify-content: center; align-items: flex-start; padding: 40px 16px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: var(--radius); padding: 24px;
    width: 100%; max-width: 700px; position: relative;
  }
  .modal h2 { margin-bottom: 16px; font-size: 1.2rem; }
  .modal-close {
    position: absolute; top: 12px; right: 16px; background: none; border: none;
    font-size: 1.5rem; cursor: pointer; color: var(--text-light);
  }

  .actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border-radius: var(--radius); padding: 16px; text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .stat-card .stat-num { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
  .stat-card .stat-label { font-size: .8rem; color: var(--text-light); margin-top: 4px; }

  .empty-state { text-align: center; padding: 40px; color: var(--text-light); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: .85rem; font-family: inherit; }

  /* Package card */
  .pkg-card {
    background: var(--card); border-radius: 8px; padding: 0;
    box-shadow: 0 1px 3px rgba(0,0,0,.05); margin-bottom: 6px; overflow: hidden;
  }
  .pkg-header {
    padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; transition: background .2s; border-left: 4px solid var(--primary);
  }
  .pkg-header:hover { background: var(--bg); }
  .pkg-header .pkg-title { font-weight: 600; font-size: .95rem; }
  .pkg-header .pkg-info { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pkg-body { padding: 0 14px 12px; display: none; }
  .pkg-body.open { display: block; }

  .round-item {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 4px; cursor: pointer; transition: all .2s;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px;
  }
  .round-item:hover { border-color: var(--primary); box-shadow: 0 1px 4px rgba(37,99,235,.15); }
  .round-item .round-title { font-weight: 500; font-size: .9rem; }
  .round-item .round-meta { font-size: .75rem; color: var(--text-light); display: flex; gap: 8px; flex-wrap: wrap; }

  .timeline { position: relative; padding-left: 20px; }
  .timeline::before {
    content: ''; position: absolute; left: 7px; top: 0; bottom: 0;
    width: 2px; background: var(--border);
  }
  .timeline-item { position: relative; margin-bottom: 6px; }
  .timeline-item::before {
    content: ''; position: absolute; left: -17px; top: 6px;
    width: 10px; height: 10px; border-radius: 50%; background: var(--primary); border: 2px solid white;
  }
  .timeline-item.done::before { background: var(--success); }
  .timeline-item.overdue::before { background: var(--danger); }

  .expand-icon { transition: transform .2s; font-size: 1.2rem; }
  .expand-icon.open { transform: rotate(90deg); }

  .remain-text { color: var(--danger); font-weight: 700; }
  .badge-green { background: #dcfce7; color: var(--success); }
  .badge-gray { background: #f1f5f9; color: var(--text-light); }

  .section-block { margin-bottom: 16px; }
  .section-header {
    padding: 10px 14px; border-radius: 8px;
    background: linear-gradient(135deg, var(--primary), #7c3aed);
    color: white; font-weight: 600; font-size: .95rem; margin-bottom: 8px;
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    user-select: none;
  }
  .section-header:hover { opacity: .9; }
  .section-body { display: none; }
  .section-body.open { display: block; }

  .pay-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  .pay-table th {
    background: var(--primary); color: white; padding: 10px 12px; text-align: left;
    font-weight: 500; position: sticky; top: 0;
  }
  .pay-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .pay-table tr:hover td { background: var(--bg); }
  .pay-table .period-header td {
    background: linear-gradient(135deg, var(--primary), #7c3aed);
    color: white; font-weight: 600; font-size: 1rem; padding: 12px;
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
</head>
<body>

<header>
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
    <div>
      <h1>📋 文件進版管理系統</h1>
      <p>追蹤文件進版時程、送審歷程、負責人及事前作業</p>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <button onclick="exportData()" style="padding:6px 12px;border:1px solid rgba(255,255,255,.4);background:transparent;color:white;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:inherit">📤 匯出備份</button>
      <label style="padding:6px 12px;border:1px solid rgba(255,255,255,.4);background:transparent;color:white;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:inherit">📥 匯入備份<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
      <span id="sync-status" style="font-size:.75rem;padding:4px 8px;border-radius:4px"></span>
    </div>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" data-tab="dashboard">總覽</button>
    <button class="tab-btn" data-tab="packages">文件列表</button>
    <button class="tab-btn" data-tab="payment">請款總表</button>
    <button class="tab-btn" data-tab="docnumbers">文號查詢</button>
    <button class="tab-btn" data-tab="wordgen">請款文件製作</button>
    <button class="tab-btn" data-tab="add-pkg">新增文件</button>
  </div>

  <!-- Dashboard -->
  <div class="tab-content active" id="tab-dashboard">
    <div class="stats" id="stats"></div>
    <div class="card">
      <h3>⚠️ 即將到期 / 已逾期</h3>
      <div id="urgent-list"></div>
    </div>
    <div class="card">
      <h3>✅ 已核定文件</h3>
      <div class="filter-bar" style="margin-bottom:8px">
        <input type="text" id="approved-search" placeholder="搜尋已核定文件..." style="flex:1;min-width:150px;" oninput="renderDashboard()">
      </div>
      <div id="approved-list"></div>
    </div>
  </div>

  <!-- Package List -->
  <div class="tab-content" id="tab-packages">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="搜尋文件名稱..." style="flex:1;min-width:150px;">
      <select id="sort-mode" onchange="renderPkgList()">
        <option value="stroke">依筆畫排序</option>
        <option value="number">依編號排序</option>
        <option value="time">依建立時間</option>
      </select>
    </div>
    <div id="pkg-list"></div>
  </div>

  <!-- Payment Summary -->
  <div class="tab-content" id="tab-payment">
    <div id="payment-summary"></div>
  </div>

  <!-- Document Number Lookup -->
  <div class="tab-content" id="tab-docnumbers">
    <div class="filter-bar">
      <input type="text" id="docnum-search" placeholder="搜尋文號、文件名稱..." style="flex:1;min-width:150px;" oninput="renderDocNumbers()">
      <select id="docnum-section" onchange="renderDocNumbers()">
        <option value="all">全部區段</option>
        <option value="第一區段">第一區段</option>
        <option value="第二區段">第二區段</option>
        <option value="第三區段">第三區段</option>
        <option value="其他需送審的文件">其他需送審的文件</option>
      </select>
    </div>
    <div id="docnum-list"></div>
  </div>

  <!-- Word Document Generator -->
  <div class="tab-content" id="tab-wordgen">
    <div class="card">
      <h3>📄 請款文件製作</h3>
      <p style="color:var(--text-light);font-size:.85rem;margin-bottom:12px">
        先選區段，再勾選文件，該文件所有送審過程（全部版次）會自動全部納入「文件履約情形一覽表」，格式比照公司範本（單一連續表格，項次／函文單位時間文號及內容／依據或說明／契約規定日期／備註(附件)）。
      </p>
      <div class="filter-bar">
        <input type="text" id="wordgen-search" placeholder="搜尋文件名稱..." style="flex:1;min-width:150px;" oninput="renderWordGen()">
        <button class="btn btn-outline btn-sm" onclick="toggleAllWordGen()">全選 / 取消全選</button>
      </div>
    </div>
    <div id="wordgen-list"></div>
    <div class="actions" style="position:sticky;bottom:16px;background:var(--card);padding:12px;border-radius:var(--radius);box-shadow:0 -2px 8px rgba(0,0,0,.08)">
      <button class="btn btn-primary" onclick="exportWordDoc()">📄 匯出 Word 文件</button>
      <span id="wordgen-count" style="align-self:center;color:var(--text-light);font-size:.85rem">已選擇 0 份文件</span>
    </div>
  </div>

  <!-- Add Package -->
  <div class="tab-content" id="tab-add-pkg">
    <div class="card">
      <h3 id="pkg-form-title">新增文件</h3>
      <form id="pkg-form">
        <input type="hidden" id="pkg-edit-id">
        <div class="form-group">
          <label>所屬區段 *</label>
          <select id="pkg-section" required>
            <option value="">請選擇</option>
            <option value="第一區段">第一區段</option>
            <option value="第二區段">第二區段</option>
            <option value="第三區段">第三區段</option>
            <option value="其他需送審的文件">其他需送審的文件</option>
          </select>
        </div>
        <div class="form-group">
          <label>文件名稱 *</label>
          <input type="text" id="pkg-name" required placeholder="例：結構計算書">
        </div>
        <div class="form-group">
          <label>文件編號</label>
          <input type="text" id="pkg-number" placeholder="例：DOC-001">
        </div>
        <div class="form-group">
          <label>負責人</label>
          <input type="text" id="pkg-person" placeholder="例：王小明">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>請款狀態</label>
            <select id="pkg-payment">
              <option value="">請選擇</option>
              <option value="需請款">需請款文件</option>
              <option value="無須請款">無須請款文件</option>
              <option value="已請款完成">已請款完成</option>
            </select>
          </div>
          <div class="form-group">
            <label>請款日期</label>
            <input type="date" id="pkg-payment-date">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>第幾期請款</label>
            <input type="text" id="pkg-payment-period" placeholder="例：第1期">
          </div>
          <div class="form-group">
            <label>核定狀態</label>
            <select id="pkg-approved">
              <option value="">請選擇</option>
              <option value="未核定">未核定</option>
              <option value="已核定">已核定</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>備註</label>
          <textarea id="pkg-note" rows="2" placeholder="文件說明..."></textarea>
        </div>
        <div class="actions">
          <button type="submit" class="btn btn-primary" id="pkg-submit-btn">儲存文件</button>
          <button type="button" class="btn btn-outline" onclick="resetPkgForm()">清除</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Round Modal (Add/Edit submission round) -->
<div class="modal-overlay" id="round-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeRoundModal()">&times;</button>
    <h2 id="round-form-title">新增送審紀錄</h2>
    <form id="round-form">
      <input type="hidden" id="round-pkg-id">
      <input type="hidden" id="round-edit-id">

      <div class="form-row-3">
        <div class="form-group">
          <label>版次 *</label>
          <input type="text" id="round-version" required placeholder="例：A、B、C">
        </div>
        <div class="form-group">
          <label>紀錄類型</label>
          <select id="round-type">
            <option value="進版">進版</option>
            <option value="抽換">抽換</option>
            <option value="外審">外審</option>
            <option value="會議">會議</option>
          </select>
        </div>
        <div class="form-group">
          <label>審查等級</label>
          <select id="round-review-level">
            <option value="">請選擇</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>負責人</label>
          <input type="text" id="round-person" placeholder="例：王小明">
        </div>
      </div>

      <div class="card" style="background:var(--bg);margin-bottom:14px">
        <h3 style="font-size:.95rem">📤 發文資訊</h3>
        <div class="form-row">
          <div class="form-group">
            <label>發文文號</label>
            <input type="text" id="round-send-no" placeholder="例：北工字第1130001號">
          </div>
          <div class="form-group">
            <label>發文日期</label>
            <input type="date" id="round-send-date">
          </div>
        </div>
      </div>

      <div class="card" style="background:var(--bg);margin-bottom:14px">
        <h3 style="font-size:.95rem">📥 收文資訊</h3>
        <div class="form-row">
          <div class="form-group">
            <label>收文文號</label>
            <input type="text" id="round-recv-no" placeholder="例：北工字第1130002號">
          </div>
          <div class="form-group">
            <label>收文日期</label>
            <input type="date" id="round-recv-date">
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>PCM規定天數（從收文日起算）</label>
          <div style="display:flex;gap:8px;align-items:center">
            <span>+</span>
            <input type="number" id="round-pcm-days" min="0" placeholder="天數" style="width:100px">
            <span>天</span>
          </div>
          <div id="round-pcm-result" class="date-result"></div>
        </div>
        <div class="form-group">
          <label>契約提送天數（從收文日起算）</label>
          <div style="display:flex;gap:8px;align-items:center">
            <span>+</span>
            <input type="number" id="round-contract-days" min="0" placeholder="天數" style="width:100px">
            <span>天</span>
          </div>
          <div id="round-contract-result" class="date-result"></div>
        </div>
      </div>

      <div class="form-group">
        <label>IVV意見</label>
        <select id="round-ivv">
          <option value="">請選擇</option>
          <option value="無須評鑑">無須評鑑</option>
          <option value="可接受">可接受</option>
          <option value="修正">修正</option>
          <option value="0版評鑑">0版評鑑</option>
        </select>
      </div>

      <div class="form-group">
        <label>備註</label>
        <textarea id="round-note" rows="2" placeholder="補充說明..."></textarea>
      </div>

      <div class="form-group">
        <label>事前作業清單</label>
        <div class="checklist-add">

// 匯入資料
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);

    } catch(err) { alert('檔案讀取失敗：' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function addDaysToDate(dateStr, days) { const d = new Date(dateStr); d.setDate(d.getDate() + days); return d; }
function fmtDate(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function remainDays(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const t = new Date(dateStr); t.setHours(0,0,0,0);
  return Math.ceil((t - today) / 86400000);
}
function remainText(dateStr) {
  const r = remainDays(dateStr);
  const txt = r >= 0 ? '剩餘' + r + '天' : '已逾期' + Math.abs(r) + '天';
  return `<span class="remain-text">${txt}</span>`;
}
// 版次排序：A~E → 0 → 0A~0E → 1 → 1A~1E → 2 ...
function versionOrder(v) {
  if (!v) return -1;
  v = v.toUpperCase();
  const letterVal = {'A':1,'B':2,'C':3,'D':4,'E':5};
  // 純字母 A~E（初始進版）
  if (/^[A-E]$/.test(v)) return letterVal[v];
  // 純數字 0, 1, 2...（審查等級A後的版本）
  if (/^\d+$/.test(v)) return (parseInt(v) + 1) * 10;
  // 數字+字母 0A, 1B...
  const m = v.match(/^(\d+)([A-E])$/);
  if (m) return (parseInt(m[1]) + 1) * 10 + letterVal[m[2]];
  return -1;
}

function roundStatus(round, pkg) {
  // 已核定文件，所有版次自動標為已完成
  if (pkg && pkg.approved === '已核定') return 'completed';
  // 如果有更新的版次存在，此版次自動標為已完成
  if (pkg && round.version) {
    const versions = [...new Set(pkg.rounds.map(r => r.version).filter(Boolean))];
    const currentOrder = versionOrder(round.version);
    const hasNewer = versions.some(v => versionOrder(v) > currentOrder);
    if (hasNewer) return 'completed';
    // 同版次中，只有最後一筆為進行中，其餘標為已完成
    const sameVerRounds = pkg.rounds.filter(r => r.version === round.version);
    if (sameVerRounds.length > 1) {
      const lastRound = sameVerRounds[sameVerRounds.length - 1];
      if (round.id !== lastRound.id) return 'completed';
    }
  }
  if (round.tasks && round.tasks.length > 0 && round.tasks.every(t => t.done)) return 'completed';
  const eff = round.pcmDate || round.contractDate || round.recvDate || round.receiveDate;
  if (!eff) return 'pending';
  const r = remainDays(eff);
  if (r < 0) return 'overdue';
  if (r <= 7) return 'near-due';
  return 'pending';
}
function statusBadge(s) {
  const m = { completed:['已完成','badge-success'], overdue:['已逾期','badge-danger'], 'near-due':['即將到期','badge-warning'], pending:['進行中','badge-info'] };
  const [l,c] = m[s]||['',''];
  return `<span class="badge ${c}">${l}</span>`;
}
function taskProgress(tasks) {
  if (!tasks || tasks.length === 0) return '';
  const done = tasks.filter(t => t.done).length;
  const pct = Math.round(done / tasks.length * 100);
  return `<div class="progress-bar"><div class="fill ${pct===100?'complete':''}" style="width:${pct}%"></div></div>
    <span style="font-size:.75rem;color:var(--text-light)">事前作業 ${done}/${tasks.length}</span>`;
}

function renderPkgList() {
  const search = document.getElementById('search-input').value.trim().toLowerCase();
  let filtered = packages.filter(p => !search || p.name.toLowerCase().includes(search) || (p.number||'').toLowerCase().includes(search));

  const container = document.getElementById('pkg-list');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>尚無文件，點擊「新增文件」開始</p></div>';
    return;
  }

  const sortMode = document.getElementById('sort-mode').value;
  filtered.sort((a, b) => {
    if (sortMode === 'stroke') return a.name.localeCompare(b.name, 'zh-Hant-TW', { sensitivity: 'base' });
    if (sortMode === 'number') return (a.number || '').localeCompare(b.number || '', undefined, { numeric: true });
    return (a.createdAt || '').localeCompare(b.createdAt || '');
  });

  const grouped = {};
  SECTIONS.forEach(s => grouped[s] = []);
  filtered.forEach(p => {
    const sec = p.section || '其他需送審的文件';
    if (!grouped[sec]) grouped[sec] = [];
    grouped[sec].push(p);
  });

  container.innerHTML = SECTIONS.map(sec => {
    const pkgs = grouped[sec];
    if (pkgs.length === 0 && search) return '';
    const isOpen = openSections[sec];
    const totalRounds = pkgs.reduce((sum, p) => sum + p.rounds.length, 0);
    return `
      <div class="section-block">
        <div class="section-header" onclick="toggleSection('${esc(sec)}')">
          <span>📂 ${esc(sec)}（${pkgs.length} 份文件 / ${totalRounds} 筆紀錄）</span>
          <span class="expand-icon ${isOpen?'open':''}">▶</span>
        </div>
        <div class="section-body ${isOpen?'open':''}">
          ${pkgs.length === 0 ? '<p style="color:var(--text-light);font-size:.9rem;padding:8px 16px">此區段尚無文件</p>' : pkgs.map(p => renderPkgCard(p)).join('')}
        </div>
      </div>`;
  }).join('');
}

function renderPkgCard(p) {
    const isOpen = openPkgs[p.id];
    const roundCount = p.rounds.length;
    const urgentCount = p.rounds.filter(r => { const s = roundStatus(r,p); return s === 'overdue' || s === 'near-due'; }).length;

  return `
      <div class="pkg-card">
        <div class="pkg-header" onclick="togglePkg('${p.id}')">
          <div>
            <div class="pkg-title">${esc(p.name)} ${p.number ? `<span style="font-weight:400;color:var(--text-light);font-size:.85rem">${esc(p.number)}</span>` : ''} ${p.approved === '已核定' ? '<span class="badge badge-green">已核定</span>' : ''} ${p.payment === '已請款完成' ? '<span class="badge badge-green">已請款完成</span>' : p.payment === '需請款' ? '<span class="badge badge-warning">需請款</span>' : p.payment === '無須請款' ? '<span class="badge badge-gray">無須請款</span>' : ''}${p.paymentDate ? ' <span style="font-size:.8rem;font-weight:400;color:var(--text-light)">請款日：'+p.paymentDate+'</span>' : ''}${p.paymentPeriod ? ' <span class="badge badge-purple">'+esc(p.paymentPeriod)+'</span>' : ''}</div>
            <div style="font-size:.8rem;color:var(--text-light);margin-top:4px">
              ${p.person ? '👤 '+esc(p.person)+' ｜ ' : ''}共 ${roundCount} 筆送審紀錄
              ${urgentCount > 0 ? ` ｜ <span style="color:var(--danger)">${urgentCount} 筆需注意</span>` : ''}
            </div>
          </div>
          <div class="pkg-info">
            <span class="expand-icon ${isOpen?'open':''}">▶</span>
          </div>
        </div>
        <div class="pkg-body ${isOpen?'open':''}" id="pkg-body-${p.id}">
          <div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-success btn-sm" onclick="event.stopPropagation();openAddRound('${p.id}')">＋ 新增送審紀錄</button>
            <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();editPkg('${p.id}')">編輯文件</button>
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deletePkg('${p.id}')">刪除文件</button>
          </div>
          ${roundCount === 0 ? '<p style="color:var(--text-light);font-size:.9rem;padding:8px 0">尚無送審紀錄</p>' :
            (() => {
              const sortedRounds = [...p.rounds].sort((a, b) => {
                const da = a.recvDate || a.sendDate || '';
                const db = b.recvDate || b.sendDate || '';
                return da.localeCompare(db);
              });
              const typeBadge = { '進版':'badge-info', '抽換':'badge-warning', '外審':'badge-purple', '會議':'badge-gray' };
              return `<div class="timeline">` + sortedRounds.map(r => {
                const s = roundStatus(r,p);
                const ver = r.version || '未分類';
                const type = r.type || '進版';
                return `
                  <div class="timeline-item ${s === 'completed' ? 'done' : s === 'overdue' ? 'overdue' : ''}">
                    <div class="round-item" onclick="event.stopPropagation();showRoundDetail('${p.id}','${r.id}')">
                      <div style="width:100%">
                        <div class="round-title">
                          <span class="badge badge-info">${esc(ver)}版</span>
                          <span class="badge ${typeBadge[type] || 'badge-info'}">${esc(type)}</span>
                          ${r.sendNo ? `<span>📤 發文：${esc(r.sendNo)}</span>` : ''}
                          ${r.recvNo ? `<span>📥 收文：${esc(r.recvNo)}</span>` : ''}
                          ${statusBadge(s)}
                        </div>
                        <div class="round-meta">
                          ${r.reviewLevel ? `<span>審查${esc(r.reviewLevel)}</span>` : ''}
                          ${r.person ? `<span>👤 ${esc(r.person)}</span>` : ''}
                          ${r.sendDate ? `<span>📤 發文日：${r.sendDate}</span>` : ''}
                          ${r.recvDate ? `<span>📥 收文日：${r.recvDate}</span>` : ''}
                          ${r.pcmDate ? `<span>PCM：${r.pcmDate}${s !== 'completed' ? '（'+remainText(r.pcmDate)+'）' : ''}</span>` : ''}
                          ${r.contractDate ? `<span>契約：${r.contractDate}${s !== 'completed' ? '（'+remainText(r.contractDate)+'）' : ''}</span>` : ''}
                        </div>
                        ${taskProgress(r.tasks)}
                      </div>
                    </div>
                  </div>`;
              }).join('') + `</div>`;
            })()
          }
        </div>
      </div>`;
}

function togglePkg(id) {
  openPkgs[id] = !openPkgs[id];
  renderPkgList();
}

// === Round Detail ===
function showRoundDetail(pkgId, roundId) {
  const pkg = packages.find(p => p.id === pkgId);
  const r = pkg?.rounds.find(x => x.id === roundId);
  if (!r) return;
  const s = roundStatus(r,pkg);
  const tasksHtml = r.tasks && r.tasks.length > 0
    ? r.tasks.map((t, i) => `
        <div class="checklist-item">
          <input type="checkbox" ${t.done?'checked':''} onchange="toggleRoundTask('${pkgId}','${roundId}',${i},this.checked)">
          <span class="item-text ${t.done?'done':''}">${esc(t.text)}</span>
        </div>`).join('')
    : '<p style="color:var(--text-light);font-size:.9rem">尚未設定事前作業</p>';

  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:8px">
      <h2 style="margin:0">${esc(pkg.name)} — ${esc(r.version || '')}版</h2>
      ${statusBadge(s)}
    </div>
    <p style="color:var(--text-light);margin-bottom:16px;font-size:.85rem">
      ${r.version ? '版次：'+esc(r.version) : ''}${r.type ? ' ｜ 類型：'+esc(r.type) : ''}${r.reviewLevel ? ' ｜ 審查等級：'+esc(r.reviewLevel) : ''}${r.person ? ' ｜ 負責人：'+esc(r.person) : ''}
    </p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="card" style="margin:0;border-left:3px solid var(--primary)">
        <div style="font-size:.8rem;color:var(--text-light)">📤 發文文號</div>
        <div style="font-weight:600;font-size:1rem;margin-top:4px">${r.sendNo ? esc(r.sendNo) : '—'}</div>
        ${r.sendDate ? `<div style="font-size:.8rem;color:var(--text-light);margin-top:4px">日期：${r.sendDate}</div>` : ''}
      </div>
      <div class="card" style="margin:0;border-left:3px solid #7c3aed">
        <div style="font-size:.8rem;color:var(--text-light)">📥 收文文號</div>
        <div style="font-weight:600;font-size:1rem;margin-top:4px">${r.recvNo ? esc(r.recvNo) : '—'}</div>
        ${r.recvDate ? `<div style="font-size:.8rem;color:var(--text-light);margin-top:4px">日期：${r.recvDate}</div>` : ''}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="card" style="margin:0">
        <div style="font-size:.8rem;color:var(--text-light)">PCM規定時間</div>
        <div style="font-weight:600;font-size:1.1rem">${r.pcmDate || '—'}</div>
        ${r.pcmDate && s !== 'completed' ? `<div style="font-size:.8rem;margin-top:4px">${remainText(r.pcmDate)}</div>` : ''}
      </div>
      <div class="card" style="margin:0">
        <div style="font-size:.8rem;color:var(--text-light)">契約提送時間</div>
        <div style="font-weight:600;font-size:1.1rem">${r.contractDate || '—'}</div>
        ${r.contractDate && s !== 'completed' ? `<div style="font-size:.8rem;margin-top:4px">${remainText(r.contractDate)}</div>` : ''}
      </div>
    </div>
    ${r.ivv ? `<div class="card" style="margin-bottom:12px"><div style="font-size:.8rem;color:var(--text-light)">IVV意見</div><div style="font-weight:600;margin-top:4px">${esc(r.ivv)}</div></div>` : ''}
    ${r.note ? `<div class="card" style="margin-bottom:12px"><div style="font-size:.8rem;color:var(--text-light)">備註</div><div style="margin-top:4px">${esc(r.note)}</div></div>` : ''}
    <div class="card" style="margin-bottom:0">
      <h3>事前作業清單</h3>
      ${taskProgress(r.tasks)}
      <div style="margin-top:8px">${tasksHtml}</div>
    </div>
    <div class="actions">
      <button class="btn btn-primary btn-sm" onclick="editRound('${pkgId}','${r.id}')">編輯</button>
      <button class="btn btn-danger btn-sm" onclick="deleteRound('${pkgId}','${r.id}')">刪除</button>
    </div>
  `;
  document.getElementById('detail-modal').classList.add('open');
}

// === Dashboard ===
function renderDashboard() {
  // 按區段統計文件數
  const sectionCounts = {};
  SECTIONS.forEach(s => sectionCounts[s] = 0);
  const approvedCount = packages.filter(p => p.approved === '已核定').length;
  let overdue = 0, nearDue = 0;
  const urgentItems = [];
  packages.forEach(p => {
    const sec = p.section || '其他需送審的文件';
    if (sectionCounts[sec] !== undefined) sectionCounts[sec]++;
    p.rounds.forEach(r => {
      const s = roundStatus(r,p);
      if (s === 'overdue') { overdue++; urgentItems.push({pkg:p, round:r, status:s}); }
      if (s === 'near-due') { nearDue++; urgentItems.push({pkg:p, round:r, status:s}); }
    });
  });

  document.getElementById('stats').innerHTML = `
    ${SECTIONS.map(sec => `<div class="stat-card"><div class="stat-num">${sectionCounts[sec]}</div><div class="stat-label">${esc(sec)}</div></div>`).join('')}
    <div class="stat-card"><div class="stat-num" style="color:var(--success)">${approvedCount}</div><div class="stat-label">已核定</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--warning)">${nearDue}</div><div class="stat-label">即將到期</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--danger)">${overdue}</div><div class="stat-label">已逾期</div></div>
  `;

  const container = document.getElementById('urgent-list');
  if (urgentItems.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>太好了！目前沒有緊急項目</p></div>';
  } else {
    urgentItems.sort((a,b) => {
      const da = a.round.pcmDate || a.round.contractDate || a.round.recvDate || a.round.receiveDate;
      const db = b.round.pcmDate || b.round.contractDate || b.round.recvDate || b.round.receiveDate;
      return new Date(da) - new Date(db);
    });
    container.innerHTML = urgentItems.map(item => `
      <div class="round-item" onclick="showRoundDetail('${item.pkg.id}','${item.round.id}')" style="border-left:3px solid ${item.status==='overdue'?'var(--danger)':'var(--warning)'}">
        <div>
          <div class="round-title">${esc(item.pkg.name)} — ${esc(item.round.version||'')}版 ${statusBadge(item.status)}</div>
          <div class="round-meta">
            ${item.round.person ? `<span>👤 ${esc(item.round.person)}</span>` : ''}
            ${item.round.sendNo ? `<span>📤 ${esc(item.round.sendNo)}</span>` : ''}
            ${item.round.recvNo ? `<span>📥 ${esc(item.round.recvNo)}</span>` : ''}
            ${item.round.pcmDate ? `<span>PCM：${item.round.pcmDate}（${remainText(item.round.pcmDate)}）</span>` : ''}
            ${item.round.contractDate ? `<span>契約：${item.round.contractDate}（${remainText(item.round.contractDate)}）</span>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  // 已核定文件列表
  const approvedSearch = (document.getElementById('approved-search')?.value || '').trim().toLowerCase();
  const approvedPkgs = packages.filter(p => p.approved === '已核定' && (!approvedSearch || p.name.toLowerCase().includes(approvedSearch) || (p.number||'').toLowerCase().includes(approvedSearch)));
  const approvedContainer = document.getElementById('approved-list');
  if (approvedPkgs.length === 0) {
    approvedContainer.innerHTML = '<p style="color:var(--text-light);font-size:.9rem;padding:8px 0">' + (approvedSearch ? '沒有符合的已核定文件' : '目前沒有已核定的文件') + '</p>';
  } else {
    approvedContainer.innerHTML = approvedPkgs.map(p => `
      <div class="round-item" style="border-left:3px solid var(--success);cursor:default">
        <div>
          <div class="round-title">${esc(p.name)} ${p.number ? '<span style="color:var(--text-light);font-size:.8rem">'+esc(p.number)+'</span>' : ''} <span class="badge badge-green">已核定</span></div>
          <div class="round-meta">
            <span>📂 ${esc(p.section || '—')}</span>
            ${p.person ? '<span>👤 '+esc(p.person)+'</span>' : ''}
            <span>共 ${p.rounds.length} 筆送審紀錄</span>
            ${p.payment ? '<span>'+esc(p.payment)+'</span>' : ''}
          </div>
        </div>
      </div>
    `).join('');
  }
}

// === Payment Summary ===
function renderPaymentSummary() {
  const payPkgs = packages.filter(p => p.payment && p.payment !== '無須請款');
  const container = document.getElementById('payment-summary');

  if (payPkgs.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">💰</div><p>目前沒有需請款的文件</p></div>';
    return;
  }

  const grouped = {};
  payPkgs.forEach(p => {
    const period = p.paymentPeriod || '未指定期數';
    if (!grouped[period]) grouped[period] = [];
    grouped[period].push(p);
  });

  const periods = Object.keys(grouped).sort((a, b) => {
    const na = parseInt(a.replace(/\D/g, '')) || 9999;
    const nb = parseInt(b.replace(/\D/g, '')) || 9999;
    return na - nb;
  });

  let html = '';
  periods.forEach(period => {
    const items = grouped[period];
    const doneCount = items.filter(p => p.payment === '已請款完成').length;
    const totalCount = items.length;

    html += `
      <div class="card" style="margin-bottom:20px;padding:0;overflow:hidden">
        <table class="pay-table">
          <tr class="period-header">
            <td colspan="6">
              💰 ${esc(period)}
              <span style="font-weight:400;font-size:.85rem;margin-left:12px">
                共 ${totalCount} 份文件，已請款 ${doneCount} 份
              </span>
              ${doneCount === totalCount ? ' <span class="badge badge-green" style="margin-left:8px">全部完成</span>' : ''}
            </td>
          </tr>
          <tr>
            <th>區段</th>
            <th>文件名稱</th>
            <th>負責人</th>
            <th>請款日期</th>
            <th>核定狀態</th>
            <th>請款狀態</th>
          </tr>
          ${items.map(p => {
            const hasRounds = p.rounds && p.rounds.length > 0;
            const groupedRounds = {};
            if (hasRounds) {
              p.rounds.forEach(r => { const v = r.version || '未分類'; if (!groupedRounds[v]) groupedRounds[v] = []; groupedRounds[v].push(r); });
            }
            return `
              <tr style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'table-row':'none'">
                <td>${esc(p.section || '—')}</td>
                <td style="font-weight:500">
                  ${hasRounds ? '<span style="color:var(--primary);margin-right:4px">▶</span>' : ''}
                  ${esc(p.name)}${p.number ? ' <span style="color:var(--text-light);font-size:.8rem">'+esc(p.number)+'</span>' : ''}
                  <span style="color:var(--text-light);font-size:.8rem;margin-left:6px">${p.rounds.length} 筆紀錄</span>
                </td>
                <td>${esc(p.person || '—')}</td>
                <td>${p.paymentDate || '—'}</td>
                <td>${p.approved === '已核定' ? '<span class="badge badge-green">已核定</span>' : p.approved === '未核定' ? '<span class="badge badge-warning">未核定</span>' : '—'}</td>
                <td>${p.payment === '已請款完成' ? '<span class="badge badge-green">✅ 已請款完成</span>' : '<span class="badge badge-warning">需請款</span>'}</td>
              </tr>
              <tr style="display:none">
                <td colspan="6" style="padding:0;background:var(--bg)">
                  ${hasRounds ? `
                    <div style="padding:12px 16px">
                      ${Object.entries(groupedRounds).sort((a,b) => versionOrder(a[0]) - versionOrder(b[0])).map(([ver, rounds]) => `
                        <div style="margin-bottom:12px">
                          <div style="font-weight:600;font-size:.9rem;margin-bottom:6px;padding:4px 10px;background:white;border-radius:6px;border-left:3px solid var(--primary);display:inline-block">
                            📁 ${esc(ver)}版
                            ${rounds[0].reviewLevel ? '<span class="badge badge-warning" style="margin-left:4px">審查'+esc(rounds[0].reviewLevel)+'</span>' : ''}
                          </div>
                          ${rounds.map(r => {
                            const s = roundStatus(r,p);
                            return `
                              <div style="margin:6px 0 6px 16px;padding:10px 14px;background:white;border-radius:8px;border-left:3px solid ${s==='completed'?'var(--success)':s==='overdue'?'var(--danger)':'var(--primary)'}">
                                <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:4px">
                                  ${r.sendNo ? '<span style="font-weight:500">📤 '+esc(r.sendNo)+'</span>' : ''}
                                  ${r.recvNo ? '<span style="font-weight:500">📥 '+esc(r.recvNo)+'</span>' : ''}
                                  ${!r.sendNo && !r.recvNo ? '<span style="font-weight:500">'+esc(ver)+'版紀錄</span>' : ''}
                                  ${statusBadge(s)}
                                  ${r.ivv ? '<span class="badge badge-purple">IVV：'+esc(r.ivv)+'</span>' : ''}
                                </div>
                                <div style="font-size:.8rem;color:var(--text-light);display:flex;flex-wrap:wrap;gap:10px">
                                  ${r.person ? '<span>👤 '+esc(r.person)+'</span>' : ''}
                                  ${r.sendDate ? '<span>📤 發文日：'+r.sendDate+'</span>' : ''}
                                  ${r.recvDate ? '<span>📥 收文日：'+r.recvDate+'</span>' : ''}
                                  ${r.pcmDate ? '<span>PCM：'+r.pcmDate+'（'+remainText(r.pcmDate)+'）</span>' : ''}
                                  ${r.contractDate ? '<span>契約：'+r.contractDate+'（'+remainText(r.contractDate)+'）</span>' : ''}
                                </div>
                                ${r.tasks && r.tasks.length > 0 ? '<div style="margin-top:6px;font-size:.8rem;color:var(--text-light)">事前作業：'+r.tasks.filter(t=>t.done).length+'/'+r.tasks.length+' 完成</div>' : ''}
                                ${r.note ? '<div style="margin-top:4px;font-size:.8rem;color:var(--text-light)">備註：'+esc(r.note)+'</div>' : ''}
                              </div>`;
                          }).join('')}
                        </div>
                      `).join('')}
                    </div>
                  ` : '<div style="padding:12px 16px;color:var(--text-light);font-size:.9rem">尚無送審紀錄</div>'}
                </td>
              </tr>`;
          }).join('')}
        </table>
      </div>`;
  });

  container.innerHTML = html;
}

// === Document Number Lookup ===
let openDocNumCards = {};

function toggleDocNumCard(id) {
  openDocNumCards[id] = !openDocNumCards[id];
  renderDocNumbers();
}

function renderDocNumbers() {
  const search = (document.getElementById('docnum-search').value || '').trim().toLowerCase();
  const sectionFilter = document.getElementById('docnum-section').value;
  const container = document.getElementById('docnum-list');

  if (!search && sectionFilter === 'all') {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>輸入文件名稱關鍵字搜尋，或選擇區段篩選</p></div>';
    return;
  }

  const matchedPkgs = packages.filter(p => {
    const nameHit = !search || p.name.toLowerCase().includes(search) || (p.number || '').toLowerCase().includes(search);
    const sectionHit = sectionFilter === 'all' || (p.section || '其他需送審的文件') === sectionFilter;
    return nameHit && sectionHit;
  });

  if (matchedPkgs.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>找不到符合條件的文件</p></div>';
    return;
  }

  container.innerHTML = matchedPkgs.map(p => {
    const sortedRounds = [...p.rounds].sort((a, b) => {
      const da = a.recvDate || a.sendDate || '';
      const db = b.recvDate || b.sendDate || '';
      return da.localeCompare(db);
    });

    // 找出最新（最近進版時間）的紀錄
    const latestRound = sortedRounds.length > 0 ? sortedRounds[sortedRounds.length - 1] : null;
    const latestEff = latestRound ? (latestRound.pcmDate || latestRound.contractDate) : null;
    const isOpen = openDocNumCards[p.id] !== false; // 預設展開

    return `
      <div class="card" style="margin-bottom:12px;padding:0;overflow:hidden">
        <div style="padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;user-select:none" onclick="toggleDocNumCard('${p.id}')">
          <div>
            <h3 style="margin:0;display:inline">${esc(p.name)}</h3>
            ${p.number ? ' <span style="color:var(--text-light);font-size:.85rem">'+esc(p.number)+'</span>' : ''}
            ${p.approved === '已核定' ? ' <span class="badge badge-green">已核定</span>' : ''}
            <div style="font-size:.8rem;color:var(--text-light);margin-top:4px">
              📂 ${esc(p.section || '—')} ${p.person ? '｜ 👤 '+esc(p.person) : ''} ｜ 共 ${sortedRounds.length} 筆公文紀錄
            </div>
          </div>
          <span class="expand-icon ${isOpen?'open':''}">▶</span>
        </div>
        <div style="padding:${isOpen ? '0 16px 16px' : '0'};display:${isOpen ? 'block' : 'none'}">
          ${latestEff ? `
            <div class="date-result show ${remainDays(latestEff) < 0 ? 'danger' : remainDays(latestEff) <= 7 ? 'warn' : 'ok'}" style="margin-bottom:12px">
              🎯 最近進版時間：${latestEff}（${remainText(latestEff)}）
            </div>
          ` : ''}
          ${sortedRounds.length === 0 ? '<p style="color:var(--text-light);font-size:.9rem">尚無公文紀錄</p>' : `
            <div class="timeline">
              ${sortedRounds.map((r, idx) => {
                const isLatest = latestRound && r.id === latestRound.id;
                const s = roundStatus(r, p);
                return `
                  <div class="timeline-item ${s === 'completed' && !isLatest ? 'done' : s === 'overdue' ? 'overdue' : ''}">
                    <div class="round-item" style="cursor:default;${isLatest ? 'border-color:var(--primary);box-shadow:0 0 0 2px rgba(37,99,235,.15)' : ''}">
                      <div style="width:100%">
                        <div class="round-title">
                          <span class="badge badge-info">${esc(r.version || '—')}版</span>
                          <span class="badge ${r.type==='抽換'?'badge-warning':r.type==='外審'?'badge-purple':r.type==='會議'?'badge-gray':'badge-info'}">${esc(r.type || '進版')}</span>
                          ${r.sendNo ? `<span>📤 ${esc(r.sendNo)}</span>` : ''}
                          ${r.recvNo ? `<span>📥 ${esc(r.recvNo)}</span>` : ''}
                          ${isLatest ? '<span class="badge badge-purple">最新</span>' : statusBadge(s)}
                          <button class="btn btn-outline btn-sm" style="margin-left:auto;padding:2px 8px;font-size:.75rem" onclick="showRoundDetail('${p.id}','${r.id}')">詳情</button>
                        </div>
                        <div class="round-meta">
                          ${r.sendDate ? `<span>📤 發文日：${r.sendDate}</span>` : ''}
                          ${r.recvDate ? `<span>📥 收文日：${r.recvDate}</span>` : ''}
                          ${r.pcmDate ? `<span>PCM：${r.pcmDate}${isLatest ? '（'+remainText(r.pcmDate)+'）' : ''}</span>` : ''}
                          ${r.contractDate ? `<span>契約：${r.contractDate}${isLatest ? '（'+remainText(r.contractDate)+'）' : ''}</span>` : ''}
                        </div>
                      </div>
                    </div>
                  </div>`;
              }).join('')}
            </div>
          `}
        </div>
      </div>`;
  }).join('');
}

// === 請款文件製作 (Word Generator) ===
let wordGenSelected = {}; // pkgId -> true（選取整份文件，含所有版次過程）

function renderWordGen() {
  const search = (document.getElementById('wordgen-search').value || '').trim().toLowerCase();
  const container = document.getElementById('wordgen-list');
  const filtered = packages.filter(p =>
    (!search || p.name.toLowerCase().includes(search) || (p.number||'').toLowerCase().includes(search))
    && p.rounds && p.rounds.length > 0
  );

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📄</div><p>沒有符合的文件</p></div>';
    updateWordGenCount();
    return;
  }

  const grouped = {};
  SECTIONS.forEach(s => grouped[s] = []);
  filtered.forEach(p => {
    const sec = p.section || '其他需送審的文件';
    if (!grouped[sec]) grouped[sec] = [];
    grouped[sec].push(p);
  });

  container.innerHTML = SECTIONS.map(sec => {
    const pkgs = grouped[sec];
    if (pkgs.length === 0) return '';
    return `
      <div class="card" style="margin-bottom:12px">
        <div style="font-weight:600;margin-bottom:10px;color:var(--primary)">📂 ${esc(sec)}</div>
        ${pkgs.map(p => `
          <label style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer">
            <input type="checkbox" ${wordGenSelected[p.id] ? 'checked' : ''} onchange="togglePkgWordGen('${p.id}', this.checked)">
            <span style="flex:1">
              ${esc(p.name)} ${p.number ? '<span style="color:var(--text-light);font-size:.8rem">'+esc(p.number)+'</span>' : ''}
              <span style="color:var(--text-light);font-size:.8rem">（共 ${p.rounds.length} 筆過程紀錄）</span>
            </span>
          </label>
        `).join('')}
      </div>`;
  }).join('');
  updateWordGenCount();
}

function togglePkgWordGen(pkgId, checked) {
  if (checked) wordGenSelected[pkgId] = true; else delete wordGenSelected[pkgId];
  updateWordGenCount();
}

function toggleAllWordGen() {
  const anySelected = Object.keys(wordGenSelected).length > 0;
  wordGenSelected = {};
  if (!anySelected) {
    packages.forEach(p => { if (p.rounds && p.rounds.length > 0) wordGenSelected[p.id] = true; });
  }
  renderWordGen();
}

function updateWordGenCount() {
  const el = document.getElementById('wordgen-count');
  if (el) el.textContent = '已選擇 ' + Object.keys(wordGenSelected).length + ' 份文件';
}

async function exportWordDoc() {
  const selectedPkgIds = Object.keys(wordGenSelected);
  if (selectedPkgIds.length === 0) { alert('請至少勾選一份文件'); return; }
  if (typeof docx === 'undefined') { alert('Word 產生元件尚未載入，請稍後再試'); return; }

  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, BorderStyle, AlignmentType, VerticalAlign } = docx;

  // 比照範本：單一連續表格，5欄，寬度與範本一致 (單位:DXA)
  const colWidths = [704, 4536, 5783, 1588, 1337];
  const tableWidth = colWidths.reduce((a,b) => a+b, 0);
  const border = { style: BorderStyle.SINGLE, size: 4, color: "000000" };
  const borders = { top: border, bottom: border, left: border, right: border };

  function cellPara(text, opts) {
    opts = opts || {};
    return new Paragraph({
      alignment: opts.center ? AlignmentType.CENTER : AlignmentType.LEFT,
      children: [new TextRun({ text: text, color: opts.red ? "FF0000" : "000000", size: 20, font: "Times New Roman" })]
    });
  }
  function makeCell(width, paras, opts) {
    opts = opts || {};
    return new TableCell({
      borders, width: { size: width, type: WidthType.DXA },
      verticalAlign: VerticalAlign.CENTER,
      gridSpan: opts.span,
      margins: { top: 40, bottom: 40, left: 60, right: 60 },
      children: paras.length ? paras : [new Paragraph({ children: [new TextRun("")] })]
    });
  }

  function headerRow() {
    return new TableRow({
      tableHeader: true,
      children: [
        makeCell(colWidths[0], [cellPara("項次", { center: true })]),
        makeCell(colWidths[1], [cellPara("函文單位、時間、文號及內容", { center: true })]),
        makeCell(colWidths[2], [cellPara("依據或說明", { center: true })]),
        makeCell(colWidths[3], [cellPara("契約規定日期", { center: true })]),
        makeCell(colWidths[4], [cellPara("備註(附件)", { center: true })]),
      ]
    });
  }

  function titleRow(text) {
    return new TableRow({
      children: [makeCell(tableWidth, [cellPara(text, { center: true })], { span: 5 })]
    });
  }

  const rows = [headerRow()];

  // 依勾選文件的所屬區段、順序排列；每份文件先放一列橫跨全表的標題列，再列出該文件所有過程
  const selectedPkgs = packages.filter(p => wordGenSelected[p.id]);

  selectedPkgs.forEach((p, gi) => {
    rows.push(titleRow(p.name));

    const sortedRounds = [...p.rounds].sort((a, b) => {
      const da = a.recvDate || a.sendDate || '';
      const db = b.recvDate || b.sendDate || '';
      return da.localeCompare(db);
    });

    sortedRounds.forEach((r, idx) => {
      const itemNo = (gi + 1) + '-' + (idx + 1);

      // 函文單位、時間、文號及內容
      const contentParas = [];
      if (r.unit) contentParas.push(cellPara(r.unit));
      const dateNoLine = (r.recvDate || r.sendDate || '') + (r.recvNo || r.sendNo ? '　' + (r.recvNo || r.sendNo) : '');
      if (dateNoLine.trim()) contentParas.push(cellPara(dateNoLine, { red: true }));
      const verLabel = r.version ? '（' + r.version + '版' + (r.type && r.type !== '進版' ? r.type : '') + '）' : '';
      contentParas.push(cellPara(p.name + verLabel, { red: true }));
      if (contentParas.length === 0) contentParas.push(cellPara(''));

      // 依據或說明
      const basisParas = r.note ? [cellPara(r.note)] : [cellPara('')];

      // 契約規定日期
      const dateParas = [];
      const effDate = r.pcmDate || r.contractDate;
      const days = r.pcmDays != null ? r.pcmDays : r.contractDays;
      if (r.recvDate && days != null && effDate) {
        dateParas.push(cellPara('契約規定預計函覆時程：', { red: true }));
        dateParas.push(cellPara(r.recvDate + '+' + days + '日：' + effDate, { red: true }));
      }
      if (r.recvDate) dateParas.push(cellPara('實際函覆日期：' + r.recvDate, { red: true }));
      if (dateParas.length === 0) dateParas.push(cellPara('-'));

      // 備註(附件)：無逾期/已逾期 + 附件留空給使用者自行填寫
      let remarkText = '-';
      if (effDate && r.recvDate) {
        const diffDays = Math.round((new Date(effDate) - new Date(r.recvDate)) / 86400000);
        remarkText = diffDays < 0 ? '(已逾期' + Math.abs(diffDays) + '天)' : '(無逾期)';
      }
      const remarkParas = [cellPara(remarkText, { center: true }), cellPara('', { center: true })];

      rows.push(new TableRow({
        children: [
          makeCell(colWidths[0], [cellPara(itemNo, { center: true })]),
          makeCell(colWidths[1], contentParas),
          makeCell(colWidths[2], basisParas),
          makeCell(colWidths[3], dateParas),
          makeCell(colWidths[4], remarkParas),
        ]
      }));
    });
  });

  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size: { width: 16838, height: 11906, orientation: docx.PageOrientation.LANDSCAPE },
          margin: { top: 1000, right: 700, bottom: 1000, left: 700 }
        }
      },
      children: [
        new Table({ width: { size: tableWidth, type: WidthType.DXA }, columnWidths: colWidths, rows })
      ]
    }]
  });

  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '文件履約情形一覽表_' + new Date().toISOString().slice(0,10) + '.docx';
  a.click();
  URL.revokeObjectURL(url);
}

// Filter
document.getElementById('search-input').addEventListener('input', renderPkgList);

// Init
renderDashboard();
renderPkgList();
</script>
